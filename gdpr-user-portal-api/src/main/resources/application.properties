spring.application.name=gdpr-user-portal-api

# Auto-configuration will use @Primary DataSource

# PRIMARY DATABASE (SQL Server - cefladb_iot)
spring.datasource.primary.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;databaseName=cefladb_iot;encrypt=false;}
spring.datasource.primary.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.primary.password=${SPRING_DATASOURCE_PASSWORD:Password123!}
spring.datasource.primary.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.primary.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.datasource.primary.hibernate.ddl-auto=none

# AUTH DATABASE (PostgreSQL - authdb)
spring.datasource.auth.url=${AUTH_DATASOURCE_URL:jdbc:postgresql://localhost:5432/authdb}
spring.datasource.auth.username=${AUTH_DATASOURCE_USERNAME:authuser}
spring.datasource.auth.password=${AUTH_DATASOURCE_PASSWORD:AuthPassword2026!}
spring.datasource.auth.driver-class-name=org.postgresql.Driver
spring.datasource.auth.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.auth.hibernate.ddl-auto=update

# General JPA configs
spring.jpa.show-sql=true

# JWT settings
spring.app.jwtSecret=Q2VmbGFTZWNyZXRLZXlGb3JKd3RBdXRoZW50aWNhdGlvbjIwMjZNdXN0QmVMb25nRW5vdWdoMTIzNDU2Nzg5MA==
spring.app.jwtExpirationMs=86400000